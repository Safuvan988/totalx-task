name: totelx_task
description: "TotalX Task - User Management App with MSG91 OTP Authentication"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Dependency Injection
  get_it: ^8.0.2

  # Navigation
  go_router: ^14.6.2

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Image
  image_picker: ^1.1.2
  path_provider: ^2.1.4

  # Utils
  uuid: ^4.5.1
  intl: ^0.19.0

  # Permissions
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/images/
